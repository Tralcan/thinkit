<!DOCTYPE html>
<html>
<body>
    <script>
        const urlParams = new URLSearchParams(window.location.search);
        const code = urlParams.get('code');
        const state = urlParams.get('state');
        const error = urlParams.get('error');

        if (error) {
            alert('Error Strava: ' + error);
            window.close();
        } else if (code && state) {
            // Decodificamos el 'state' que guardamos en el servidor, 
            // que contiene la URL de retorno dinámica (la de AI Studio o la final)
            const targetUrl = decodeURIComponent(state);
            window.location.href = targetUrl + (targetUrl.includes('?') ? '&' : '?') + 'code=' + code;
        } else {
            console.error('Faltan parámetros code o state');
        }
    </script>
</body>
</html>
